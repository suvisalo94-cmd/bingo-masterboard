<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Masterboard</title>
<style>
* { box-sizing: border-box; } /* CRITICAL: Prevents padding from breaking layout */

html, body { 
  margin: 0; 
  padding: 0; 
  height: 100%; 
  font-family: "Avenir Next", sans-serif; 
  overflow: hidden; 
  background: #f2f2f2; 
}

body { display: flex; flex-direction: column; }

h1 { margin: 0.5vh 0; text-align: center; font-size: 3vh; color: #333; flex-shrink: 0; }

#main { 
  flex: 1; 
  display: flex; 
  gap: 1.5vw; 
  padding: 1.5vh 1.5vw; 
  overflow: hidden; 
}

#lastNumberPanel { 
  width: 22%; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
}

#logo { 
  width: 100%; 
  max-height: 15vh; 
  object-fit: contain; 
  margin-bottom: 2vh; 
  border-radius: 12px; 
}

#drawBtn { 
  width: 100%; 
  margin-bottom: 2vh; 
  padding: 1.8vh; 
  font-size: 2.2vh; 
  background: linear-gradient(135deg, #FF008C, #ff4bad); 
  color: white; 
  border: none; 
  border-radius: 12px; 
  cursor: pointer; 
  font-weight: bold; 
  box-shadow: 0 0.5vh 0 #b30062; 
}

#drawBtn:active { transform: translateY(0.2vh); box-shadow: 0 0.3vh 0 #b30062; }
#drawBtn:disabled { background: #ccc; box-shadow: 0 0.4vh 0 #999; }

#circle { 
  width: 100%; 
  aspect-ratio: 1 / 1; 
  border-radius: 50%; 
  background: #333; 
  border: 0.6vh solid #FF008C; 
  color: white; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  justify-content: center; 
}
#letter { font-size: 6vh; font-weight: bold; }
#number { font-size: 8vh; font-weight: bold; }

.cute-btn { 
  margin-top: 2vh; 
  border: none; 
  padding: 1vh; 
  width: 100%;
  font-size: 1.4vh; 
  border-radius: 999px; 
  background: #ddd; 
  cursor: pointer; 
}

/* Updated Board Styles */
#board { 
  flex: 1; 
  display: grid; 
  grid-template-columns: repeat(5, 1fr); 
  background: white; 
  border-radius: 15px; 
  padding: 1.5vh; 
  border: 1px solid #ddd;
  overflow: hidden; /* Keeps circles inside the white box */
}

.column { 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  border-right: 1px solid #f0f0f0; 
  height: 100%;
}
.column:last-child { border-right: none; }

.column-header { 
  width: 90%; 
  background: #FF008C; 
  color: white; 
  text-align: center; 
  font-weight: 800; 
  border-radius: 8px; 
  padding: 0.8vh 0; 
  margin-bottom: 1vh; 
  font-size: 2.5vh; 
  flex-shrink: 0;
}

.number-grid { 
  flex: 1; /* Takes up remaining space in the column */
  display: grid; 
  grid-template-columns: repeat(2, 1fr); 
  grid-template-rows: repeat(8, 1fr); /* Force 8 equal rows */
  gap: 0.5vh 0.5vw; 
  width: 100%;
  padding-bottom: 1vh; /* Small buffer at the bottom */
}

.number { 
  border-radius: 50%; 
  background: #fff; 
  border: 0.3vh solid #FF008C; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-weight: bold; 
  color: #FF008C;
  height: 90%; /* Scale slightly smaller than the row height */
  aspect-ratio: 1/1; /* Keep them perfect circles */
  margin: auto;
}

.number.drawn { background: #FF008C; color: white; }
.number.lonely { grid-column: 1 / span 2; }
</style>
</head>
<body>

<h1>Bingo Masterboard</h1>

<div id="main">
  <div id="lastNumberPanel">
    <img id="logo" src="pepperoni_dog.png" alt="Pepperoni Dog">
    <button id="drawBtn" onclick="drawNumber()">DRAW NUMBER</button>
    <div id="circle">
      <div id="letter">–</div>
      <div id="number">–</div>
    </div>
    <button class="cute-btn" onclick="resetBoard()">Reset Board</button>
    <button class="cute-btn" onclick="toggleFullscreen()">Fullscreen</button>
  </div>

  <div id="board"></div>
</div>

<script>
const board = document.getElementById("board");
const letterDisplay = document.getElementById("letter");
const numberDisplay = document.getElementById("number");
const drawBtn = document.getElementById("drawBtn");
const headers = ["B","I","N","G","O"];
const ranges = [[1,15],[16,30],[31,45],[46,60],[61,75]];
let drawn = [];
const allCells = {};

headers.forEach((h, i) => {
  const col = document.createElement("div");
  col.className = "column";
  const header = document.createElement("div");
  header.className = "column-header"; header.textContent = h;
  col.appendChild(header);
  
  const grid = document.createElement("div");
  grid.className = "number-grid";
  
  for (let n = ranges[i][0]; n <= ranges[i][1]; n++) {
    const cell = document.createElement("div");
    cell.className = "number"; cell.textContent = n; allCells[n] = cell;
    if (n === ranges[i][1]) cell.classList.add("lonely");
    cell.onclick = () => toggleNumber(n);
    grid.appendChild(cell);
  }
  col.appendChild(grid); board.appendChild(col);
});

function toggleNumber(n) {
  const cell = allCells[n];
  if (cell.classList.toggle("drawn")) {
    if (!drawn.includes(n)) drawn.push(n);
    updateLast(n);
  } else {
    drawn = drawn.filter(x => x !== n);
    if (drawn.length) updateLast(drawn[drawn.length - 1]);
    else { letterDisplay.textContent = "–"; numberDisplay.textContent = "–"; }
  }
  drawBtn.disabled = (drawn.length >= 75);
}

function drawNumber() {
  const available = [];
  for (let i = 1; i <= 75; i++) { if (!drawn.includes(i)) available.push(i); }
  if (available.length > 0) toggleNumber(available[Math.floor(Math.random() * available.length)]);
}

function updateLast(num) {
  const letters = ["B", "I", "N", "G", "O"];
  letterDisplay.textContent = letters[Math.min(Math.floor((num - 1) / 15), 4)];
  numberDisplay.textContent = num;
}

function resetBoard() {
  if(!confirm("Reset?")) return;
  drawn = [];
  Object.values(allCells).forEach(c => c.classList.remove("drawn"));
  letterDisplay.textContent = "–"; numberDisplay.textContent = "–"; drawBtn.disabled = false;
}

function scale() {
  const numbers = document.querySelectorAll(".number");
  numbers.forEach(n => {
    // Dynamic font size based on the actual height of the circle
    n.style.fontSize = (n.offsetHeight * 0.45) + "px";
  });
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

window.addEventListener("load", scale);
window.addEventListener("resize", scale);
</script>
</body>
</html>
