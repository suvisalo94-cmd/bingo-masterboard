<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pepperoni Bingo</title>
<style>
* { box-sizing: border-box; }

html, body { 
  margin: 0; 
  padding: 0; 
  height: 100%; 
  font-family: "Avenir Next", -apple-system, BlinkMacSystemFont, sans-serif; 
  overflow: hidden; 
  background: #f2f2f2; 
}

body { display: flex; flex-direction: column; }

/* Main layout container */
#main { 
  flex: 1; 
  display: flex; 
  gap: 1.5vw; 
  padding: 2vh 2vw; 
  overflow: hidden; 
}

/* Left side panel */
#lastNumberPanel { 
  width: 20%; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  justify-content: flex-start;
  padding-top: 2vh;
}

#logo { 
  width: 100%; 
  max-height: 18vh; 
  object-fit: contain; 
  margin-bottom: 2vh; 
  border-radius: 12px; 
}

#drawBtn { 
  width: 100%; 
  margin-bottom: 2vh; 
  padding: 1.8vh; 
  font-size: 2.2vh; 
  background: linear-gradient(135deg, #FF008C, #ff4bad); 
  color: white; 
  border: none; 
  border-radius: 12px; 
  cursor: pointer; 
  font-weight: 800; 
  box-shadow: 0 0.5vh 0 #b30062; 
  text-transform: uppercase;
  letter-spacing: 1px;
}

#drawBtn:active { transform: translateY(0.2vh); box-shadow: 0 0.3vh 0 #b30062; }
#drawBtn:disabled { background: #ccc; box-shadow: 0 0.4vh 0 #999; cursor: not-allowed; }

#circle { 
  width: 100%; 
  aspect-ratio: 1 / 1; 
  border-radius: 50%; 
  background: #333; 
  border: 0.6vh solid #FF008C; 
  color: white; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  justify-content: center; 
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}
#letter { font-size: 6vh; font-weight: bold; }
#number { font-size: 8vh; font-weight: bold; }

.cute-btn { 
  margin-top: 1.5vh; 
  border: none; 
  padding: 1vh; 
  width: 100%;
  font-size: 1.3vh; 
  border-radius: 999px; 
  background: #e0e0e0; 
  color: #555;
  cursor: pointer; 
  font-weight: 600;
}
.cute-btn:hover { background: #d0d0d0; }

/* Right side content (Header + Board) */
#boardContainer {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
}

h1 { 
  margin: 0 0 1.5vh 0; 
  text-align: center; 
  font-size: 4.5vh; 
  color: #FF008C; 
  font-weight: 900;
  text-shadow: 2px 2px 0px rgba(255, 255, 255, 1), 4px 4px 0px rgba(0,0,0,0.05);
  letter-spacing: -1px;
}

#board { 
  flex: 1; 
  display: grid; 
  grid-template-columns: repeat(5, 1fr); 
  background: white; 
  border-radius: 20px; 
  padding: 2vh; 
  border: 1px solid #ddd;
  box-shadow: 0 15px 35px rgba(0,0,0,0.05);
  overflow: hidden; 
}

.column { 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  border-right: 1px solid #f5f5f5; 
  height: 100%;
}
.column:last-child { border-right: none; }

.column-header { 
  width: 85%; 
  background: #FF008C; 
  color: white; 
  text-align: center; 
  font-weight: 800; 
  border-radius: 10px; 
  padding: 0.8vh 0; 
  margin-bottom: 1.5vh; 
  font-size: 2.8vh; 
  flex-shrink: 0;
}

.number-grid { 
  flex: 1; 
  display: grid; 
  grid-template-columns: repeat(2, 1fr); 
  grid-template-rows: repeat(8, 1fr); 
  gap: 0.5vh 0.5vw; 
  width: 100%;
}

.number { 
  border-radius: 50%; 
  background: #fff; 
  border: 0.35vh solid #FF008C; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-weight: 800; 
  color: #FF008C;
  height: 85%; 
  aspect-ratio: 1/1; 
  margin: auto;
  transition: transform 0.1s;
}

.number.drawn { background: #FF008C; color: white; transform: scale(1.05); }
.number.lonely { grid-column: 1 / span 2; }
</style>
</head>
<body>

<div id="main">
  <div id="lastNumberPanel">
    <img id="logo" src="pepperoni_dog.png" alt="Pepperoni Dog">
    <button id="drawBtn" onclick="drawNumber()">DRAW NUMBER</button>
    <div id="circle">
      <div id="letter">–</div>
      <div id="number">–</div>
    </div>
    <button class="cute-btn" onclick="resetBoard()">Reset Board</button>
    <button class="cute-btn" onclick="toggleFullscreen()">Fullscreen Mode</button>
  </div>

  <div id="boardContainer">
    <h1>Pepperoni Bingo</h1>
    <div id="board"></div>
  </div>
</div>

<script>
const board = document.getElementById("board");
const letterDisplay = document.getElementById("letter");
const numberDisplay = document.getElementById("number");
const drawBtn = document.getElementById("drawBtn");
const headers = ["B","I","N","G","O"];
const ranges = [[1,15],[16,30],[31,45],[46,60],[61,75]];
let drawn = [];
const allCells = {};

headers.forEach((h, i) => {
  const col = document.createElement("div");
  col.className = "column";
  const header = document.createElement("div");
  header.className = "column-header"; header.textContent = h;
  col.appendChild(header);
  
  const grid = document.createElement("div");
  grid.className = "number-grid";
  
  for (let n = ranges[i][0]; n <= ranges[i][1]; n++) {
    const cell = document.createElement("div");
    cell.className = "number"; cell.textContent = n; allCells[n] = cell;
    if (n === ranges[i][1]) cell.classList.add("lonely");
    cell.onclick = () => toggleNumber(n);
    grid.appendChild(cell);
  }
  col.appendChild(grid); board.appendChild(col);
});

function toggleNumber(n) {
  const cell = allCells[n];
  if (cell.classList.toggle("drawn")) {
    if (!drawn.includes(n)) drawn.push(n);
    updateLast(n);
  } else {
    drawn = drawn.filter(x => x !== n);
    if (drawn.length) updateLast(drawn[drawn.length - 1]);
    else { letterDisplay.textContent = "–"; numberDisplay.textContent = "–"; }
  }
  drawBtn.disabled = (drawn.length >= 75);
}

function drawNumber() {
  const available = [];
  for (let i = 1; i <= 75; i++) { if (!drawn.includes(i)) available.push(i); }
  if (available.length > 0) toggleNumber(available[Math.floor(Math.random() * available.length)]);
}

function updateLast(num) {
  const letters = ["B", "I", "N", "G", "O"];
  letterDisplay.textContent = letters[Math.min(Math.floor((num - 1) / 15), 4)];
  numberDisplay.textContent = num;
}

function resetBoard() {
  if(!confirm("Start a new game? This will clear everything.")) return;
  drawn = [];
  Object.values(allCells).forEach(c => c.classList.remove("drawn"));
  letterDisplay.textContent = "–"; numberDisplay.textContent = "–"; drawBtn.disabled = false;
}

function scale() {
  const numbers = document.querySelectorAll(".number");
  numbers.forEach(n => {
    n.style.fontSize = (n.offsetHeight * 0.45) + "px";
  });
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

window.addEventListener("load", scale);
window.addEventListener("resize", scale);
</script>
</body>
</html>
